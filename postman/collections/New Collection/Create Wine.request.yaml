$kind: http-request
name: Create Wine
url: "{{baseUrl}}/wines"
method: POST
body:
  type: json
  content: "{\r

    \  \"name\": \"Chianti Classico\",\r

    \  \"winery\": \"Castello di Ama\",\r

    \  \"country\": \"Italy\",\r

    \  \"year\": 2019,\r

    \  \"rating\": 4,\r

    \  \"notes\": \"cherry, leather\"\r

    }"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 201", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      let responseJson;
      pm.test("Response is JSON", () => {
        try {
          responseJson = pm.response.json();
        } catch (e) {
          pm.expect.fail("Response body is not valid JSON");
        }
        pm.expect(responseJson).to.be.an("object");
      });

      pm.test("Has id (id or wineId)", () => {
        pm.expect(responseJson).to.be.an("object");
        pm.expect(responseJson).to.have.any.keys("id", "wineId");
      });

      pm.test("Has name and winery", () => {
        pm.expect(responseJson).to.have.property("name");
        pm.expect(responseJson.name).to.be.a("string");
        pm.expect(responseJson).to.have.property("winery");
        pm.expect(responseJson.winery).to.be.a("string");
      });

      const createdWineId = responseJson.id || responseJson.wineId;
      pm.collectionVariables.set("wineId", String(createdWineId));
    language: text/javascript
order: 1000
