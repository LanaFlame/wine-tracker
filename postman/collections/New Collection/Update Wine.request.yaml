$kind: http-request
name: Update Wine
url: "{{baseUrl}}/wines/{{wineId}}"
method: PUT
body:
  type: json
  content: "{\r

    \  \"name\": \"Updated Wine\",\r

    \  \"winery\": \"Updated Winery\",\r

    \  \"country\": \"France\",\r

    \  \"year\": 2020,\r

    \  \"rating\": 5,\r

    \  \"notes\": \"very good\"\r

    }"
scripts:
  - type: afterResponse
    code: ' pm.test("Status is 200", () => { pm.response.to.have.status(200); });'
    language: text/javascript
order: 3000
